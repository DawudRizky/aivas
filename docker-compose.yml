version: "3.8"
services:
  app:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    command: sh -c "npm ci --silent && npm run dev"
volumes:
  node_modules:
